<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flight·intel — viajes</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1e1e1e;
    --surface-3: #262626;
    --border: #2a2a2a;
    --ink: #f5f5f5;
    --ink-muted: #888;
    --ink-dim: #555;
    --accent: #ff6b35;
    --success: #4ade80;
    --warning: #fbbf24;
    --danger: #f87171;
    --gf: #4285f4;
    --bk: #003580;
    --ky: #ff690f;
    --font-sans: ui-sans-serif, system-ui, -apple-system, "SF Pro Display", "Inter", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font-sans); color: var(--ink); background: var(--bg); }
  body { min-height: 100vh; line-height: 1.5; -webkit-font-smoothing: antialiased; padding: 24px; }
  .container { max-width: 1280px; margin: 0 auto; }
  header { display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent); }
  header .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); }

  .nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .nav a { font-family: var(--font-mono); font-size: 12px;
    padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--ink-muted); text-decoration: none; }
  .nav a:hover, .nav a.active { color: var(--accent); border-color: var(--accent); }

  .trip-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .trip-header { padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .trip-header h2 { font-size: 15px; font-weight: 600; }
  .trip-header .legs { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
  .trip-header .best { font-family: var(--font-mono); font-size: 14px; color: var(--success);
    font-weight: 600; }

  .source-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--border); }
  .source-col { background: var(--surface); padding: 16px; }
  .source-col h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-muted); margin-bottom: 12px; font-weight: 500; }
  .source-col.gf h3 { color: var(--gf); }
  .source-col.bk h3 { color: var(--bk); }
  .source-col.ky h3 { color: var(--ky); }
  .quote { padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .quote:last-child { border-bottom: none; }
  .quote .price { font-family: var(--font-mono); font-size: 14px; font-weight: 600;
    color: var(--ink); }
  .quote .price.cheapest { color: var(--success); }
  .quote .detail { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted);
    margin-top: 2px; }
  .quote .book { display: inline-block; margin-top: 6px; padding: 4px 10px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 11px; color: var(--ink-muted); text-decoration: none; font-family: var(--font-mono); }
  .quote .book:hover { color: var(--accent); border-color: var(--accent); }
  .quote .book.pack { background: var(--accent); color: #fff; border-color: var(--accent); }
  .quote .book.pack:hover { background: #ff8155; }

  .empty-src { color: var(--ink-dim); font-family: var(--font-mono); font-size: 11px;
    font-style: italic; }

  .airlines-section { padding: 16px 20px; border-top: 1px solid var(--border);
    background: var(--surface-2); }
  .airlines-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--ink-muted); margin-bottom: 10px; font-weight: 500; }
  .airline-leg { margin-bottom: 12px; }
  .airline-leg .leg-label { font-family: var(--font-mono); font-size: 12px;
    color: var(--ink); margin-bottom: 6px; }
  .airline-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .airline-pill { padding: 4px 10px; background: var(--surface-3); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 11px; color: var(--ink-muted);
    text-decoration: none; font-family: var(--font-mono); }
  .airline-pill:hover { color: var(--accent); border-color: var(--accent); }
  .airline-pill .price { color: var(--success); margin-left: 6px; font-weight: 600; }

  .totalizer { margin-top: 10px; padding: 10px 12px; background: var(--surface-3);
    border-left: 3px solid var(--warning); font-family: var(--font-mono);
    font-size: 12px; }
  .totalizer .label { color: var(--ink-muted); }
  .totalizer .value { color: var(--warning); font-weight: 600; }

  .loading { padding: 48px; text-align: center; color: var(--ink-muted);
    font-family: var(--font-mono); }
  .error { padding: 12px 16px; background: rgba(248,113,113,0.1);
    border-left: 3px solid var(--danger); color: var(--danger); font-family: var(--font-mono);
    font-size: 12px; margin: 12px 0; }

  @media (max-width: 900px) {
    .source-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
<header>
  <h1>flight<span>·</span>intel — viajes</h1>
  <div class="meta" id="snapshot-meta">cargando…</div>
</header>

<div class="nav">
  <a href="index.html">búsqueda libre</a>
  <a href="trips.html" class="active">viajes pre-definidos</a>
</div>

<div id="trips-container">
  <div class="loading">cargando snapshot…</div>
</div>

<footer style="margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center;color:var(--ink-dim);font-size:11px;font-family:var(--font-mono);">
  flight-intel · multi-source · scrape diaria · <a href="https://github.com/eliasurrar" style="color:inherit;">github</a>
</footer>
</div>

<script>
// Currency conversion (rough, manual). Updated server-side ideally.
const FX_TO_USD = { USD: 1, BRL: 0.20, CLP: 0.0010, EUR: 1.08, GBP: 1.27, ARS: 0.00088, COP: 0.00025 };

function toUSD(value, currency) {
  if (value == null) return null;
  const rate = FX_TO_USD[currency] ?? 1;
  return value * rate;
}

function fmt(value, currency) {
  if (value == null) return "—";
  return `${currency} ${value.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
}

function durStr(min) {
  if (!min) return "—";
  return `${Math.floor(min/60)}h${(min%60).toString().padStart(2,"0")}m`;
}

async function loadSnapshot() {
  let indexPath = "snapshots/index.json";
  // Try latest.json pointer first
  try {
    const lp = await fetch("snapshots/latest.json", {cache: "no-store"});
    if (lp.ok) {
      const j = await lp.json();
      indexPath = `snapshots/${j.date}/index.json`;
      document.getElementById("snapshot-meta").textContent = `snapshot ${j.date} · ${j.count} viajes`;
    }
  } catch (e) {}
  const r = await fetch(indexPath, {cache: "no-store"});
  if (!r.ok) {
    document.getElementById("trips-container").innerHTML =
      `<div class="error">no snapshot found at ${indexPath}</div>`;
    return;
  }
  const idx = await r.json();
  const dir = indexPath.substring(0, indexPath.lastIndexOf("/"));
  const container = document.getElementById("trips-container");
  container.innerHTML = "";
  for (const t of idx.trips) {
    const trip = await (await fetch(`${dir}/${t.file}`, {cache: "no-store"})).json();
    container.appendChild(renderTrip(trip));
  }
}

function renderTrip(trip) {
  const card = document.createElement("div");
  card.className = "trip-card";

  // Compute cheapest across sources (normalized to USD)
  const allUSD = [];
  for (const src of ["google_flights", "booking", "kayak"]) {
    const s = trip.sources?.[src];
    if (s?.quotes) {
      for (const q of s.quotes) {
        const p = q.total_price_value ?? q.price_value;
        const c = q.total_price_currency ?? q.price_currency;
        const usd = toUSD(p, c);
        if (usd != null) allUSD.push({source: src, usd, original: fmt(p, c)});
      }
    }
  }
  allUSD.sort((a, b) => a.usd - b.usd);
  const best = allUSD[0];

  const legsTxt = trip.legs.map(l => `${l.origin}→${l.dest} ${l.date}`).join(" · ");
  card.innerHTML = `
    <div class="trip-header">
      <div>
        <h2>${trip.trip_name}</h2>
        <div class="legs">${legsTxt}</div>
      </div>
      <div class="best">${best ? `mejor: ${best.original} (~USD ${best.usd.toFixed(0)}) · ${best.source}` : "sin datos"}</div>
    </div>
    <div class="source-grid">
      ${renderSourceCol("gf", "google flights", trip.sources?.google_flights)}
      ${renderSourceCol("bk", "booking flights", trip.sources?.booking)}
      ${renderSourceCol("ky", "kayak", trip.sources?.kayak)}
    </div>
    ${renderAirlines(trip.per_leg_airlines, allUSD[0]?.usd)}
    ${renderSegments(trip.unique_segments)}
  `;
  return card;
}

function renderSourceCol(klass, label, src) {
  if (!src || !src.ok) {
    return `<div class="source-col ${klass}"><h3>${label}</h3>
      <div class="empty-src">${src?.error ? "error: " + String(src.error).substring(0,80) : "sin datos"}</div></div>`;
  }
  const quotes = src.quotes || [];
  if (quotes.length === 0) {
    return `<div class="source-col ${klass}"><h3>${label}</h3>
      <div class="empty-src">0 resultados</div>
      <a class="book" href="${src.search_url}" target="_blank" rel="noopener">abrir búsqueda ↗</a>
    </div>`;
  }
  const items = quotes.slice(0, 4).map((q, i) => {
    const p = q.total_price_value ?? q.price_value;
    const c = q.total_price_currency ?? q.price_currency;
    const stops = q.legs?.[0]?.stops ?? q.n_stops ?? 0;
    const dur = q.total_duration_min ?? q.legs?.[0]?.duration_min ?? 0;
    const airline = q.legs?.[0]?.airline || "—";
    const url = q.booking_url || src.search_url;
    const hasPack = !!q.booking_url;
    return `<div class="quote">
      <div class="price ${i===0?'cheapest':''}">${fmt(p, c)}</div>
      <div class="detail">${airline} · ${stops===0?'directo':stops+' escalas'} · ${durStr(dur)}</div>
      <a class="book ${hasPack?'pack':''}" href="${url}" target="_blank" rel="noopener">
        ${hasPack ? "comprar pack ↗" : "ver búsqueda ↗"}
      </a>
    </div>`;
  }).join("");
  return `<div class="source-col ${klass}"><h3>${label}</h3>${items}</div>`;
}

function renderAirlines(perLeg, bestUSD) {
  if (!perLeg || !perLeg.length) return "";
  const blocks = perLeg.map(leg => {
    const pills = leg.airlines.map(a => {
      const priceTxt = a.price_value != null
        ? `<span class="price">${fmt(a.price_value, a.price_currency)}</span>` : "";
      return `<a class="airline-pill" href="${a.url}" target="_blank" rel="noopener">${a.airline}${priceTxt}</a>`;
    }).join("");
    return `<div class="airline-leg">
      <div class="leg-label">${leg.origin} → ${leg.dest} · ${leg.date}</div>
      <div class="airline-pills">${pills}</div>
    </div>`;
  }).join("");

  // Σ of available per-airline prices in USD (per leg pick cheapest)
  let sumUSD = 0;
  let okLegs = 0;
  for (const leg of perLeg) {
    const prices = leg.airlines
      .filter(a => a.price_value != null)
      .map(a => toUSD(a.price_value, a.price_currency))
      .filter(x => x != null);
    if (prices.length) {
      sumUSD += Math.min(...prices);
      okLegs++;
    }
  }
  const totalizer = okLegs === perLeg.length
    ? `<div class="totalizer">
        <span class="label">Σ tramos independientes (mín por tramo): </span>
        <span class="value">USD ${sumUSD.toFixed(0)}</span>
        ${bestUSD != null ? ` · vs mejor pack USD ${bestUSD.toFixed(0)}
          (Δ ${(sumUSD-bestUSD).toFixed(0)})` : ""}
      </div>`
    : `<div class="totalizer">
        <span class="label">tramos sin precio escrapeable — usar links para cotizar manualmente</span>
      </div>`;

  return `<div class="airlines-section">
    <h3>links directos por tramo (aerolíneas)</h3>
    ${blocks}
    ${totalizer}
  </div>`;
}

function renderSegments(segments) {
  if (!segments || !segments.length) return "";
  const groups = {};
  for (const s of segments) {
    const k = `${s.origin}-${s.dest}-${s.date}`;
    (groups[k] ||= []).push(s);
  }
  const statusOrder = { scraped: 0, ocr_failed: 1, pending: 2, blocked: 3, failed: 4, no_flights: 5, no_url: 6 };
  const groupHtml = Object.entries(groups).map(([k, segs]) => {
    segs.sort((a, b) => {
      if (a.price_value && !b.price_value) return -1;
      if (!a.price_value && b.price_value) return 1;
      if (a.price_value && b.price_value) return a.price_value - b.price_value;
      return (statusOrder[a.scrape_status] ?? 9) - (statusOrder[b.scrape_status] ?? 9);
    });
    const rows = segs.map(s => {
      const price = s.price_value != null
        ? `<span style="color:var(--success);font-weight:600">${fmt(s.price_value, s.price_currency)}</span>`
        : `<span style="color:var(--ink-dim)">—</span>`;
      const map = {
        scraped: ['✓ scraped', 'var(--success)'],
        ocr_failed: ['👁 ocr', 'var(--warning)'],
        pending: ['…', 'var(--ink-dim)'],
        blocked: ['⚠ bloqueado', 'var(--danger)'],
        failed: ['✗ falló', 'var(--danger)'],
        no_flights: ['sin vuelos', 'var(--ink-dim)'],
        no_url: ['sin url', 'var(--ink-dim)'],
      };
      const [lbl, color] = map[s.scrape_status] || [s.scrape_status, 'var(--ink-dim)'];
      const statusBadge = `<span style="font-size:10px;color:${color};font-family:var(--font-mono)">${lbl}</span>`;
      const timeStr = s.dep_time ? `${s.dep_time}${s.arr_time ? '→' + s.arr_time : ''}` : '';
      const srcTag = `<span style="font-size:9px;padding:1px 4px;background:var(--surface-2);border-radius:2px;color:var(--ink-muted)">${s.source.replace('google_flights', 'GF').replace('kayak', 'KY')}</span>`;
      const link = s.url
        ? `<a href="${s.url}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">comprar ↗</a>`
        : `<span style="color:var(--ink-dim)">—</span>`;
      return `<tr style="border-top:1px solid var(--border)">
        <td style="padding:6px 8px">${s.airline || '—'} ${srcTag}</td>
        <td style="padding:6px 8px;font-family:var(--font-mono);font-size:11px;color:var(--ink-muted)">${timeStr}</td>
        <td style="padding:6px 8px;text-align:right;font-family:var(--font-mono)">${price}</td>
        <td style="padding:6px 8px;text-align:center">${statusBadge}</td>
        <td style="padding:6px 8px;text-align:right">${link}</td>
      </tr>`;
    }).join("");
    const parts = k.split("-");
    const [o, d, dt] = [parts[0], parts[1], parts.slice(2).join("-")];
    return `<div style="margin-bottom:14px">
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--ink);margin-bottom:6px">
        ${o} → ${d} · ${dt}  <span style="color:var(--ink-dim);font-size:10px">${segs.length} opción${segs.length===1?'':'es'}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;background:var(--surface-3);border-radius:var(--radius);overflow:hidden">
        <thead style="background:var(--surface-2)"><tr>
          <th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--ink-muted);text-transform:uppercase">aerolínea</th>
          <th style="text-align:left;padding:6px 8px;font-size:10px;color:var(--ink-muted);text-transform:uppercase">horario</th>
          <th style="text-align:right;padding:6px 8px;font-size:10px;color:var(--ink-muted);text-transform:uppercase">precio</th>
          <th style="text-align:center;padding:6px 8px;font-size:10px;color:var(--ink-muted);text-transform:uppercase">status</th>
          <th style="text-align:right;padding:6px 8px;font-size:10px;color:var(--ink-muted);text-transform:uppercase">link</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join("");
  const totalScraped = segments.filter(s => s.scrape_status === "scraped").length;
  return `<div class="airlines-section">
    <h3>vuelos individuales descubiertos por tramo (${segments.length} segmentos · ${totalScraped} con precio)</h3>
    ${groupHtml}
  </div>`;
}

loadSnapshot();
</script>
</body>
</html>
